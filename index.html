<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <title>Swupper</title>
  </head>
  <body>
    <div id="game-root">
      <div id="hud">
        <div class="badge">
          <span class="lbl">Seed</span>
          <span id="seed-label">1</span>
        </div>
        <div class="badge">
          <span class="lbl">Hamle</span>
          <span id="moves-label">0</span>
        </div>
      </div>

      <div id="canvas-wrap">
        <canvas id="game-canvas"></canvas>
      </div>

      <div id="difficulty-row">
        <span>Kolay</span>
        <input type="range" id="difficulty" min="0" max="100" step="1" value="50" />
        <span>Zor</span>
        <span id="diff-badge">Orta &nbsp;50%</span>
      </div>

      <div id="controls">
        <button id="btn-restart">Yeniden Baslat</button>
        <button id="btn-new-seed">Yeni Seed</button>
      </div>
    </div>

    <script type="module" src="./js/game.js"></script>
  </body>
</html>
